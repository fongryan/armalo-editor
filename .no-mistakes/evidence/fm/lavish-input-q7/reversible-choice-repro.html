<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lavish Reversible Choice Repro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #10131a;
        color: #f7f3ea;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid #303745;
        border-radius: 24px;
        background: #171a21;
        box-shadow: 0 24px 90px rgb(0 0 0 / 35%);
        padding: 32px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 46px);
      }

      p {
        color: #b9c0cf;
        line-height: 1.6;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        margin-top: 28px;
      }

      button {
        border: 1px solid #3c4557;
        border-radius: 18px;
        background: #1c212b;
        color: #f7f3ea;
        cursor: pointer;
        font: inherit;
        padding: 18px;
        text-align: left;
      }

      button:hover,
      button:focus-visible {
        border-color: #f4c95d;
        outline: none;
      }

      strong {
        display: block;
        color: #ffd877;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <main data-lavish-question="deployment-plan">
      <h1>Pick one deployment plan</h1>
      <p>Click Plan A, then Plan B. The Lavish queue should replace the stale answer and keep only Plan B.</p>
      <div class="choices">
        <button
          type="button"
          data-lavish-action
          id="plan-a"
          onclick="window.lavish.queuePrompt('Use Plan A', { selector: '#plan-a', tag: 'choice', text: 'Plan A', queueKey: 'deployment-plan' })"
        >
          <strong>Plan A</strong>
          Slow migration with a compatibility layer.
        </button>
        <button
          type="button"
          data-lavish-action
          id="plan-b"
          onclick="window.lavish.queuePrompt('Use Plan B', { selector: '#plan-b', tag: 'choice', text: 'Plan B', queueKey: 'deployment-plan' })"
        >
          <strong>Plan B</strong>
          Direct cutover after the readiness check.
        </button>
      </div>
    </main>
  </body>
</html>
