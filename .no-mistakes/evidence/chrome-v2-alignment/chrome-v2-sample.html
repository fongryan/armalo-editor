<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lavish Chrome v2 Evidence</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f6f1e8;
        color: #17130a;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 72px 28px;
      }
      .card {
        border: 1px solid rgba(23, 19, 10, 0.18);
        border-radius: 24px;
        background: #fffaf1;
        box-shadow: 0 24px 80px rgba(23, 19, 10, 0.12);
        padding: 40px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: clamp(36px, 7vw, 76px);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }
      p {
        max-width: 56ch;
        font-size: 18px;
        line-height: 1.55;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: #17130a;
        color: #fffaf1;
        padding: 12px 18px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Review the v2 chrome.</h1>
        <p>
          This artifact exists to verify the Lavish Editor frame, overflow menu, annotation switch, empty-composer hint,
          and split send button in a real browser session.
        </p>
        <button type="button">Native button should stay interactive</button>
      </section>
    </main>
  </body>
</html>
